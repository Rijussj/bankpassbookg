<!DOCTYPE html>
<html>
<head>
<title>ICICI Passbook Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.container{
background:white;
padding:20px;
width:400px;
margin:auto;
border-radius:8px;
}

input{
width:90%;
padding:10px;
margin:8px;
}

button{
padding:12px 25px;
margin-top:10px;
cursor:pointer;
}

.passbook{
width:700px;
margin:30px auto;
background:white;
border:1px solid #ccc;
display:none;
}

.header{
background:#f58220;
color:white;
padding:20px;
display:flex;
align-items:center;
}

.header img{
height:60px;
margin-right:20px;
}

.details{
text-align:left;
padding:20px;
font-size:18px;
line-height:30px;
}

</style>
</head>

<body>

<h2>ICICI Passbook Generator</h2>

<div class="container">

<input id="name" placeholder="Customer Name">
<input id="account" placeholder="Account Number">
<input id="branch" placeholder="Branch">
<input id="ifsc" placeholder="IFSC Code">
<input id="address" placeholder="Address">
<input id="branch2" placeholder="Branch2">
  
<br>

<button onclick="generatePassbook()">Generate Passbook</button>

</div>


<div class="passbook" id="passbook">

<div class="header">

<img id="logo">

<h2>ICICI Bank Passbook</h2>

</div>

<div class="details">

<p id="pname"></p>
<p id="paccount"></p>
<p id="pbranch"></p>
<p id="pifsc"></p>
<p id="paddress"></p>

<button onclick="downloadPDF()">Download Passbook</button>

</div>

</div>

function generatePassbook(){

document.getElementById("pname").innerText="Customer Name: "+document.getElementById("name").value
document.getElementById("paccount").innerText="Account Number: "+document.getElementById("account").value
document.getElementById("pbranch").innerText="Branch: "+document.getElementById("branch").value
document.getElementById("pifsc").innerText="IFSC Code: "+document.getElementById("ifsc").value
document.getElementById("paddress").innerText="Address: "+document.getElementById("address").value
document.getElementById("pbranch2").innerText="Branch: "+document.getElementById("branch2").value
  
document.getElementById("passbook").style.display="block"

}

function downloadPDF(){

html2canvas(document.querySelector("#passbook")).then(canvas=>{

const imgData=canvas.toDataURL("image/png")

const { jsPDF } = window.jspdf

const pdf=new jsPDF("p","mm","a4")

pdf.addImage(imgData,"PNG",10,10,190,0)

pdf.save("ICICI_Passbook.pdf")

})

}

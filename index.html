<!DOCTYPE html>
<html>
<head>
<title>ICICI Passbook Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.container{
background:white;
padding:20px;
width:360px;
margin:auto;
margin-top:40px;
border-radius:8px;
box-shadow:0 0 10px #ccc;
}

input{
width:90%;
padding:8px;
margin:6px;
}

button{
background:#f37b20;
color:white;
padding:10px;
border:none;
width:95%;
font-size:16px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>ICICI Passbook Generator</h2>

<input id="name" placeholder="Customer Name">
<input id="account" placeholder="Account Number">
<input id="branch" placeholder="Branch">
<input id="ifsc" placeholder="IFSC Code">
<input id="address" placeholder="Address">

<button id="downloadBtn">Download Passbook</button>

</div>

<script>

document.getElementById("downloadBtn").addEventListener("click", generatePDF);

function generatePDF(){

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

let name=document.getElementById("name").value;
let account=document.getElementById("account").value;
let branch=document.getElementById("branch").value;
let ifsc=document.getElementById("ifsc").value;
let address=document.getElementById("address").value;

/* ICICI header */

doc.setFillColor(243,123,32);
doc.rect(0,0,210,25,"F");

/* title */

doc.setTextColor(255,255,255);
doc.setFontSize(18);
doc.text("ICICI Bank Passbook",105,15,null,null,"center");

/* reset text */

doc.setTextColor(0,0,0);
doc.setFontSize(12);

/* details */

doc.text("Customer Name : "+name,20,50);
doc.text("Account Number : "+account,20,60);
doc.text("Branch : "+branch,20,70);
doc.text("IFSC Code : "+ifsc,20,80);
doc.text("Address : "+address,20,90);

/* download */

doc.save("ICICI_Passbook.pdf");

}

</script>

</body>
</html>

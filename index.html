<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>ICICI Passbook Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

input{
width:260px;
padding:10px;
margin:5px;
}

button{
padding:10px 20px;
background:#a61d55;
color:white;
border:none;
cursor:pointer;
margin:10px;
}

#passbook{
width:700px;
margin:auto;
background:white;
border:1px solid #ccc;
padding:20px;
}

.topbar{
background:#a61d55;
color:white;
padding:15px;
display:flex;
align-items:center;
}

.logo{
width:110px;
margin-right:15px;
}

.info{
text-align:left;
margin-top:20px;
font-size:18px;
}

</style>

</head>

<body>

<h2>ICICI Passbook Generator</h2>

<input id="name" placeholder="Customer Name"><br>
<input id="acc" placeholder="Account Number"><br>
<input id="branch" placeholder="Branch"><br>
<input id="ifsc" placeholder="IFSC Code"><br>
<input id="address" placeholder="Address"><br>

<button onclick="generatePassbook()">Generate Passbook</button>

<br><br>

<div id="passbook">

<div class="topbar">

<img class="logo" id="banklogo"
src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAOEAAADhCAMAAAAJbSJIAAABF1BMVEX///8AW3WwKjAAV3IAU2/5nScAVnHX5ekATWoAUW0ATGpDgJQAXHYAZH7q8vR0laP0+foqb4avJSytIzDi7O/5mx8ASGf5lgCtGCCtHiXtiylolKSsIDC90dfK2t8ARWXfsbP89/erAA747O3NeG3Ph4qlv8hOhpiCprOVsr3wkSj6tGK0w8uvx89UhJb927c7dInsy8vhrqnaoqX14t7AVFGrDBi7Qj7w2dnLd3TCXVnPgX2/XGDqw7i1NTfBZWjfmn3/8NvXdD7SjpD/58bcdSrshhG2MCv/9en6pjzHUCaoAAD9s1bcnpX8y5Tz077YbSrkkFe5MiDfbwC3Q0j8z5/DTS68Py/NXS24LBDdfD37um4AOFy9wowhAAAIMUlFTkSuQmCC">

<h2>ICICI Bank Passbook</h2>

</div>

<div class="info">

<p><b>Customer Name:</b> <span id="pname"></span></p>
<p><b>Account Number:</b> <span id="pacc"></span></p>
<p><b>Branch:</b> <span id="pbranch"></span></p>
<p><b>IFSC Code:</b> <span id="pifsc"></span></p>
<p><b>Address:</b> <span id="paddress"></span></p>

</div>

</div>

<br>

<button onclick="downloadPDF()">Download Passbook</button>

<script>

function generatePassbook(){

let name=document.getElementById("name").value || "";
let acc=document.getElementById("acc").value || "";
let branch=document.getElementById("branch").value || "";
let ifsc=document.getElementById("ifsc").value || "";
let address=document.getElementById("address").value || "";

document.getElementById("pname").innerText=name;
document.getElementById("pacc").innerText=acc;
document.getElementById("pbranch").innerText=branch;
document.getElementById("pifsc").innerText=ifsc;
document.getElementById("paddress").innerText=address;

}

function downloadPDF(){

const { jsPDF } = window.jspdf;

html2canvas(document.querySelector("#passbook"),{
scale:2,
useCORS:true
}).then(canvas => {

let img=canvas.toDataURL("image/png");

let pdf=new jsPDF("p","mm","a4");

let width=190;
let height=canvas.height*width/canvas.width;

pdf.addImage(img,"PNG",10,10,width,height);

pdf.save("ICICI_Passbook.pdf");

});

}

</script>

</body>
</html>

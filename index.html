<!DOCTYPE html>
<html>
<head>
<title>ICICI Passbook Generator</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<h2>ICICI Passbook Generator</h2>

<div class="form">

<input type="text" id="name" placeholder="Customer Name"><br>
<input type="text" id="acc" placeholder="Account Number"><br>
<input type="text" id="branch" placeholder="Branch"><br>
<input type="text" id="ifsc" placeholder="IFSC Code"><br>
<input type="text" id="address" placeholder="Address"><br>

<button onclick="generatePassbook()">Generate Passbook</button>

</div>

<br>

<div id="passbook">

<div class="topbar">
<img src="logo.png" class="logo">
<h2>ICICI Bank</h2>
</div>

<div class="info">

<p><b>Customer Name:</b> <span id="pname"></span></p>
<p><b>Account Number:</b> <span id="pacc"></span></p>
<p><b>Branch:</b> <span id="pbranch"></span></p>
<p><b>IFSC Code:</b> <span id="pifsc"></span></p>
<p><b>Address:</b> <span id="paddress"></span></p>

</div>

</div>

<br>

<button onclick="downloadPDF()">Download Passbook</button>

<script src="script.js"></script>

</body>
</html>

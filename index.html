<!DOCTYPE html>
<html>
<head>

<title>Passbook</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.box{
background:white;
width:380px;
margin:auto;
margin-top:40px;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px #ccc;
}

input{
width:90%;
padding:8px;
margin:6px;
}

button{
background:#f37b20;
color:white;
border:none;
padding:10px;
width:95%;
font-size:16px;
cursor:pointer;
}

#passbook{
width:500px;
background:white;
margin:auto;
margin-top:30px;
padding:20px;
border:1px solid #ddd;
}

.header{
background:#f37b20;
padding:10px;
text-align:center;
}

.header img{
height:50px;
}

</style>

</head>

<body>

<div class="box">

<h2>Passbook Generator</h2>

<input id="name" placeholder="Customer Name"><br>
<input id="account" placeholder="Account Number"><br>
<input id="branch" placeholder="Branch"><br>
<input id="ifsc" placeholder="IFSC Code"><br>
<input id="address" placeholder="Address"><br>

<button onclick="generate()">Preview Passbook</button>

<button onclick="downloadPDF()">Download Passbook</button>

</div>

<div id="passbook">

<div class="header">

<img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAOEAAADhCAMAAAAJbSJIAAABF1BMVEX///8AW3WwKjAAV3IAU2/5nScAVnHX5ekATWoAUW0ATGpDgJQAXHYAZH7q8vR0laP0+foqb4avJSytIzDi7O/5mx8ASGf5lgCtGCCtHiXtiylolKSsIDC90dfK2t8ARWXfsbP89/erAA747O3NeG3Ph4qlv8hOhpiCprOVsr3wkSj6tGK0w8uvx89UhJb927c7dInsy8vhrqnaoqX14t7AVFGrDBi7Qj7w2dnLd3TCXVnPgX2/XGDqw7i1NTfBZWjfmn3/8NvXdD7SjpD/58bcdSrshhG2MCv/9en6pjzHUCaoAAD9s1bcnpX8y5Tz077YbSrkkFe5MiDfbwC3Q0j8z5/DTS68Py/NXS24LBDdfD37um4AOFy9wowhAAAIMUlEQVR4nO2Za3fbxhGGCeJOAhRAgTdRgG4VQcqiTFmJKtWtXSVWLCWp66a+pG3+/+/ozOwuSMpxRZ/DHPbkvM8nYDkA5t2Z2Z2VajU">

</div>

<p id="pname"></p>
<p id="paccount"></p>
<p id="pbranch"></p>
<p id="pifsc"></p>
<p id="paddress"></p>

</div>

<script>

function generate(){

document.getElementById("pname").innerHTML="Customer Name: "+document.getElementById("name").value;

document.getElementById("paccount").innerHTML="Account Number: "+document.getElementById("account").value;

document.getElementById("pbranch").innerHTML="Branch: "+document.getElementById("branch").value;

document.getElementById("pifsc").innerHTML="IFSC Code: "+document.getElementById("ifsc").value;

document.getElementById("paddress").innerHTML="Address: "+document.getElementById("address").value;

}

function downloadPDF(){

var element = document.getElementById("passbook");

html2pdf().from(element).save("passbook.pdf");

}

</script>

</body>
</html>
